<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VSIX Finder</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f6f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; }
    main { max-width: 1040px; margin: 0 auto; }
    header { margin-bottom: 22px; }
    h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: -0.04em; }
    p { color: #536079; line-height: 1.55; }
    form { display: flex; gap: 10px; margin: 22px 0 14px; }
    input { flex: 1; padding: 14px 16px; font-size: 16px; border: 1px solid #d7dce8; border-radius: 14px; background: white; }
    button, .button { border: 0; border-radius: 14px; padding: 12px 16px; font-weight: 700; cursor: pointer; background: #18243a; color: white; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .button.secondary { background: #eef1f8; color: #22304a; }
    .filters { display:flex; gap:12px; align-items:center; flex-wrap: wrap; color:#536079; font-size: 14px; }
    .filters label { display:flex; gap:6px; align-items:center; }
    .status { min-height: 28px; color: #536079; margin-top: 16px; }
    .grid { display: grid; gap: 14px; margin-top: 16px; }
    .card { background: white; border: 1px solid #e2e6ef; border-radius: 20px; padding: 18px; box-shadow: 0 8px 24px rgba(20, 32, 54, .06); }
    .top { display: flex; gap: 16px; justify-content: space-between; align-items: flex-start; }
    h2 { margin: 0; font-size: 20px; }
    code { background: #f0f3f9; border-radius: 8px; padding: 2px 6px; }
    .meta { display:flex; gap:8px; flex-wrap:wrap; margin: 12px 0; }
    .badge { font-size: 12px; background:#eef1f8; color:#394966; border-radius:999px; padding: 5px 9px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .empty { background:#fff; border:1px dashed #ccd3e1; padding:22px; border-radius:18px; color:#536079; }
    footer { margin-top: 34px; padding-top: 18px; border-top: 1px solid #e2e6ef; color: #64708a; font-size: 14px; }
    footer a { color: #22304a; font-weight: 700; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 720px) { body { padding: 18px; } form { flex-direction: column; } .top { flex-direction: column; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>VSIX Finder</h1>
      <p>Search extension marketplaces and download <code>.vsix</code> installers for Trae, Cursor, VSCodium, code-server, and other VS Code-compatible IDEs.</p>
    </header>

    <form id="searchForm">
      <input id="query" name="query" placeholder="Search by extension name, publisher, or keyword, e.g. Python, ESLint, GitLens" autocomplete="off" required />
      <button type="submit">Search</button>
    </form>

    <div class="filters">
      <strong>Sources:</strong>
      <label><input type="checkbox" name="source" value="vscode" checked> VS Code Marketplace</label>
      <label><input type="checkbox" name="source" value="openvsx" checked> Open VSX</label>
    </div>

    <div id="status" class="status"></div>
    <section id="results" class="grid"></section>

    <footer>
      Copyright &copy; <span id="copyrightYear"></span> <a href="https://github.com/hlabsdev" target="_blank" rel="noreferrer noopener">Hlabsdev</a>. All rights reserved.
    </footer>
  </main>

  <script>
    const form = document.getElementById('searchForm');
    const results = document.getElementById('results');
    const status = document.getElementById('status');
    document.getElementById('copyrightYear').textContent = new Date().getFullYear();

    function esc(value) {
      return String(value ?? '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
    }

    function selectedSources() {
      return [...document.querySelectorAll('input[name="source"]:checked')].map(el => el.value).join(',');
    }

    function render(items) {
      results.innerHTML = '';
      if (!items.length) {
        results.innerHTML = '<div class="empty">No matching extensions found in the selected marketplaces.</div>';
        return;
      }
      for (const item of items) {
        const card = document.createElement('article');
        card.className = 'card';
        const updated = item.lastUpdated ? new Date(item.lastUpdated).toLocaleDateString() : '';
        const installs = item.installCount ? Number(item.installCount).toLocaleString() : '';
        card.innerHTML = `
          <div class="top">
            <div>
              <h2>${esc(item.displayName)}</h2>
              <p><code>${esc(item.id)}</code></p>
            </div>
            <span class="badge">${esc(item.source)}</span>
          </div>
          <p>${esc(item.description || 'No description available.')}</p>
          <div class="meta">
            ${item.version ? `<span class="badge">Version: ${esc(item.version)}</span>` : ''}
            ${updated ? `<span class="badge">Updated: ${esc(updated)}</span>` : ''}
            ${installs ? `<span class="badge">Downloads/installs: ${esc(installs)}</span>` : ''}
          </div>
          <div class="actions">
            <a class="button" href="${esc(item.downloadUrl)}">Download .vsix</a>
            <a class="button secondary" href="${esc(item.pageUrl)}" target="_blank" rel="noreferrer noopener">Marketplace page</a>
          </div>
        `;
        results.appendChild(card);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const query = document.getElementById('query').value.trim();
      const sources = selectedSources();
      if (!query) return;
      if (!sources) {
        status.textContent = 'Select at least one marketplace.';
        return;
      }
      status.textContent = 'Searching…';
      results.innerHTML = '';
      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&sources=${encodeURIComponent(sources)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || 'Search failed');
        const errors = payload.errors?.length ? ` Some sources failed: ${payload.errors.map(e => e.source).join(', ')}.` : '';
        status.textContent = `Found ${payload.results.length} result(s).${errors}`;
        render(payload.results);
      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
</body>
</html>
